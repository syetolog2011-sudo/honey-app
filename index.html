<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .keys-container {
            display: flex;
            justify-content: center;
            gap: 6px; 
            margin-top: 25px;
            margin-bottom: 25px;
            width: 98%;
            flex-wrap: wrap;
        }
        .key-slot {
            position: relative;
            width: 60px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 28px;
        }
        .key-count { position: absolute; bottom: 4px; right: 6px; font-size: 12px; font-weight: bold; background: rgba(0, 0, 0, 0.6); padding: 2px 6px; border-radius: 5px; }
        .balance-container { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
        .balance-number { font-size: 32px; font-weight: 900; }
        .honey-icon { font-size: 36px; }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; position: relative; }

        .buttons-list { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .menu-btn { 
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; 
            padding: 18px 20px; 
            cursor: pointer; 
            width: 80%; 
            max-width: 280px; 
            transition: transform 0.1s ease; 
            font-size: 24px; 
            font-weight: bold; 
            color: white; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .menu-btn:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.25); }
        .menu-btn img { width: 40px; height: 40px; object-fit: contain; }

        .banks-list, .cases-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; width: 95%; max-width: 380px; margin-top: 20px; }
        .back-arrow-btn { 
            position: absolute; 
            top: -20px; 
            right: 15px; 
            width: 44px; 
            height: 44px; 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            color: #ffffff; 
            cursor: pointer; 
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .back-arrow-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.3); }
        
        .bank-card, .case-card { 
            width: calc(50% - 7px); 
            aspect-ratio: 1 / 1; 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 20px; 
            padding: 12px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            cursor: pointer; 
            transition: transform 0.1s ease;
            font-size: 42px;
        }
        .bank-card:active, .case-card:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.96); }
        .bank-card span, .case-card span { font-size: 14px; color: #ccc; }

        .roulette-container-horizontal { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; padding: 0 10px; box-sizing: border-box; }
        .slots-lines-holder { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 25px; }
        .roulette-wrapper-horizontal { position: relative; width: 100%; height: 75px; background: #0f172a; border-radius: 16px; border: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden; }
        .roulette-marker-horizontal { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: #ef4444; z-index: 10; box-shadow: 0 0 10px #ef4444; pointer-events: none; }
        .roulette-tape-horizontal { display: flex; align-items: center; position: absolute; left: 0; top: 0; height: 100%; transition: transform 0s cubic-bezier(0.1, 0.8, 0.1, 1); will-change: transform; }
        
        .slot-item-horizontal { width: 110px; height: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; border-right: 1px solid rgba(255, 255, 255, 0.05); background: #1e293b; gap: 4px; box-sizing: border-box; }
        .slot-item-horizontal span:first-child { font-size: 24px; }

        .count-selector-box { display: flex; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; padding: 4px; gap: 5px; margin-bottom: 20px; }
        .selector-btn { background: transparent; border: none; color: #94a3b8; padding: 8px 25px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .selector-btn.active { background: rgba(255, 255, 255, 0.15); color: #ffffff; }

        .spin-actions-row { display: flex; gap: 10px; width: 95%; max-width: 340px; }
        .spin-action-btn { flex: 1; color: #ffffff; border: none; padding: 14px 8px; font-size: 15px; font-weight: bold; border-radius: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: transform 0.1s ease; }
        .btn-honey-type { background: #2563eb; }
        .btn-honey-type:active { background: #1d4ed8; transform: scale(0.97); }
        .btn-key-type { background: #10b981; }
        .btn-key-type:active { background: #059669; transform: scale(0.97); }
        .spin-action-btn:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }
        .spin-action-btn span { font-size: 20px; }

        .banks-screen-padding { height: 40px; width: 100%; }
    </style>
</head>
<body>

    <div class="keys-container">
        <div class="key-slot">🔑<div class="key-count" id="ui-key1">0</div></div>
        <div class="key-slot">🔑<div class="key-count" id="ui-key2">0</div></div>
        <div class="key-slot">🔑<div class="key-count" id="ui-key3">0</div></div>
        <div class="key-slot">🔑<div class="key-count" id="ui-key4">0</div></div>
        <div class="key-slot">🔑<div class="key-count" id="ui-key5">0</div></div>
    </div>

    <div class="balance-container">
        <div class="balance-number" id="ui-balance">12 500</div>
        <span class="honey-icon">🍯</span>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="main-screen" class="screen" style="display: flex;">
        <div class="buttons-list">
            <button class="menu-btn" onclick="switchScreen('cases-screen')">
                <span>📦</span> КЕЙСЫ
            </button>
            <button class="menu-btn" onclick="switchScreen('banks-screen')">
                <span>🏺</span> БАНКИ
            </button>
            <button class="menu-btn">
                <span>🎮</span> ИГРЫ
            </button>
        </div>
    </div>

    <!-- ЭКРАН БАНОК -->
    <div id="banks-screen" class="screen">
        <div class="back-arrow-btn" onclick="switchScreen('main-screen')">←</div>
        <div class="banks-list">
            <div class="bank-card" onclick="openHorizontalSlots(1)"><span>🏺1</span><span>Банка 1</span></div>
            <div class="bank-card" onclick="openHorizontalSlots(2)"><span>🏺2</span><span>Банка 2</span></div>
            <div class="bank-card" onclick="openHorizontalSlots(3)"><span>🏺3</span><span>Банка 3</span></div>
        </div>
        <div class="banks-screen-padding"></div>
    </div>

    <!-- ЭКРАН КЕЙСОВ -->
    <div id="cases-screen" class="screen">
        <div class="back-arrow-btn" onclick="switchScreen('main-screen')">←</div>
        <div class="cases-list">
            <div class="case-card" onclick="openCaseSlots(1)"><span>📦1</span><span>Кейс 1</span></div>
            <div class="case-card" onclick="openCaseSlots(2)"><span>📦2</span><span>Кейс 2</span></div>
            <div class="case-card" onclick="openCaseSlots(3)"><span>📦3</span><span>Кейс 3</span></div>
            <div class="case-card" onclick="openCaseSlots(4)"><span>📦4</span><span>Кейс 4</span></div>
            <div class="case-card" onclick="openCaseSlots(5)"><span>📦5</span><span>Кейс 5</span></div>
        </div>
        <div class="banks-screen-padding"></div>
    </div>

    <!-- ЭКРАН РУЛЕТКИ -->
    <div id="roulette-screen" class="screen">
        <div class="back-arrow-btn" id="roulette-back-btn">←</div>
        <div class="roulette-container-horizontal">
            <div class="count-selector-box">
                <button class="selector-btn active" id="btn-mode-1" onclick="changeLinesCount(1)">1</button>
                <button class="selector-btn" id="btn-mode-2" onclick="changeLinesCount(2)">2</button>
                <button class="selector-btn" id="btn-mode-3" onclick="changeLinesCount(3)">3</button>
            </div>
            <div class="slots-lines-holder" id="slotsHolder"></div>
            <div class="spin-actions-row">
                <button class="spin-action-btn btn-honey-type" id="btnSpinHoney" onclick="spinHorizontalSlots('honey')">
                    <span>🍯</span> <span id="spinCostText">700</span>
                </button>
                <button class="spin-action-btn btn-key-type" id="btnSpinKey" onclick="spinHorizontalSlots('key')">
                    <span>🔑</span> <span id="spinKeyText">(1)</span>
                </button>
            </div>
        </div>
        <div class="banks-screen-padding"></div>
    </div>

    <script>
        let playerData = { honey: 12500, key1: 3, key2: 2, key3: 1, key4: 0, key5: 0 };
        let currentLines = 1; 
        let isSpinning = false;
        let currentMode = 'bank'; 
        let currentBankId = 1; 
        let currentCaseId = 1;

        const itemWidth = 110; 
        
        const bankPools = {
            1: ['honey', 'empty', 'key1'],
            2: ['honey', 'empty', 'key2', 'key3'],
            3: ['honey', 'empty', 'key4', 'key5']
        };

        const casePools = {
            1: ['honey50', 'honey1100'],
            2: ['honey50', 'honey1200'],
            3: ['honey500', 'honey1600'],
            4: ['honey2300'],
            5: ['honey5000']
        };

        const bankConfigs = {
            1: { price: 300, keyReq: 'key1' },
            2: { price: 500, keyReq: 'key2' },
            3: { price: 700, keyReq: 'key4' }
        };

        const caseConfigs = {
            1: { price: 1000, keyReq: 'key1' },
            2: { price: 1250, keyReq: 'key2' },
            3: { price: 1550, keyReq: 'key3' },
            4: { price: 2000, keyReq: 'key4' },
            5: { price: 4500, keyReq: 'key5' }
        };

        function updateUI() {
            document.getElementById('ui-balance').innerText = playerData.honey.toLocaleString();
            document.getElementById('ui-key1').innerText = playerData.key1;
            document.getElementById('ui-key2').innerText = playerData.key2;
            document.getElementById('ui-key3').innerText = playerData.key3;
            document.getElementById('ui-key4').innerText = playerData.key4;
            document.getElementById('ui-key5').innerText = playerData.key5;
        }
        updateUI();

        function switchScreen(screenId) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('banks-screen').style.display = 'none';
            document.getElementById('cases-screen').style.display = 'none';
            document.getElementById('roulette-screen').style.display = 'none';
            document.getElementById(screenId).style.display = 'flex';
        }

        function openHorizontalSlots(bankId) {
            currentMode = 'bank';
            currentBankId = bankId;
            document.getElementById('roulette-back-btn').onclick = () => switchScreen('banks-screen');
            document.getElementById('btnSpinKey').style.display = 'flex';
            switchScreen('roulette-screen');
            changeLinesCount(1);
        }

        function openCaseSlots(caseId) {
            currentMode = 'case';
            currentCaseId = caseId;
            document.getElementById('roulette-back-btn').onclick = () => switchScreen('cases-screen');
            document.getElementById('btnSpinKey').style.display = 'flex';
            switchScreen('roulette-screen');
            changeLinesCount(1);
        }

        function changeLinesCount(count) {
            if (isSpinning) return;
            currentLines = count;
            for(let i=1; i<=3; i++) {
                document.getElementById(`btn-mode-${i}`).classList.remove('active');
            }
            document.getElementById(`btn-mode-${count}`).classList.add('active');
            let basePrice = currentMode === 'bank' ? bankConfigs[currentBankId].price : caseConfigs[currentCaseId].price;
            document.getElementById('spinCostText').innerText = count * basePrice;
            document.getElementById('spinKeyText').innerText = `(${count})`;
            renderRouletteLines();
        }

        function renderRouletteLines() {
            const holder = document.getElementById('slotsHolder');
            holder.innerHTML = '';
            for (let l = 0; l < currentLines; l++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'roulette-wrapper-horizontal';
                wrapper.innerHTML = `<div class="roulette-marker-horizontal"></div><div class="roulette-tape-horizontal" id="tape-${l}"></div>`;
                holder.appendChild(wrapper);
                buildSingleTape(l);
            }
        }

        function buildSingleTape(lineIndex) {
            const tape = document.getElementById(`tape-${lineIndex}`);
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            tape.innerHTML = '';
            const pool = currentMode === 'bank' ? bankPools[currentBankId] : casePools[currentCaseId];
            for (let i = 0; i < 45; i++) {
                const randType = pool[Math.floor(Math.random() * pool.length)];
                createSlotItem(tape, randType);
            }
        }

        function createSlotItem(tape, type) {
            const block = document.createElement('div');
            block.className = 'slot-item-horizontal';
            if (type === 'empty') {
                block.innerHTML = '<span>❌</span><span>Ничего</span>';
            } else if (type === 'honey') {
                block.innerHTML = '<span>🍯</span><span>Мёд</span>';
            } else if (type === 'honey50') {
                block.innerHTML = '<span>🍯</span><span>50</span>';
            } else if (type === 'honey500') {
                block.innerHTML = '<span>🍯</span><span>500</span>';
            } else if (type === 'honey1100') {
                block.innerHTML = '<span>🍯</span><span>1100</span>';
            } else if (type === 'honey1200') {
                block.innerHTML = '<span>🍯</span><span>1200</span>';
            } else if (type === 'honey1600') {
                block.innerHTML = '<span>🍯</span><span>1600</span>';
            } else if (type === 'honey2300') {
                block.innerHTML = '<span>🍯</span><span>2300</span>';
            } else if (type === 'honey5000') {
                block.innerHTML = '<span>🍯</span><span>5000</span>';
            } else if (type === 'key1') {
                block.innerHTML = '<span>🔑1</span><span>Ключ 1</span>';
            } else if (type === 'key2') {
                block.innerHTML = '<span>🔑2</span><span>Ключ 2</span>';
            } else if (type === 'key3') {
                block.innerHTML = '<span>🔑3</span><span>Ключ 3</span>';
            } else if (type === 'key4') {
                block.innerHTML = '<span>🔑4</span><span>Ключ 4</span>';
            } else if (type === 'key5') {
                block.innerHTML = '<span>🔑5</span><span>Ключ 5</span>';
            } else {
                block.innerHTML = '<span>🍯</span><span>Мёд</span>';
            }
            tape.appendChild(block);
        }

        function spinHorizontalSlots(paymentMethod) {
            if (isSpinning) return;
            let basePrice = currentMode === 'bank' ? bankConfigs[currentBankId].price : caseConfigs[currentCaseId].price;
            let requiredKey = currentMode === 'bank' ? bankConfigs[currentBankId].keyReq : caseConfigs[currentCaseId].keyReq;
            const totalCost = currentLines * basePrice;

            if (paymentMethod === 'honey') {
                if (playerData.honey < totalCost) { alert('Недостаточно мёда!'); return; }
                playerData.honey -= totalCost;
            } else {
                if (playerData[requiredKey] < currentLines) { alert('Недостаточно ключей!'); return; }
                playerData[requiredKey] -= currentLines;
            }

            isSpinning = true;
            updateUI();
            document.getElementById('btnSpinHoney').disabled = true;
            document.getElementById('btnSpinKey').disabled = true;

            const winIndex = 30;
            let results = [];

            for (let l = 0; l < currentLines; l++) {
                let rand = Math.random() * 100;
                let prize = { type: 'empty', val: 0 };
                
                if (currentMode === 'bank') {
                    if (currentBankId === 1) {
                        if (rand < 40) prize = { type: 'empty', val: 0 };
                        else if (rand < 99) { let val = Math.floor(Math.random() * 250) + 200; prize = { type: 'honey', val: val }; }
                        else prize = { type: 'key1', val: 1 };
                    } else if (currentBankId === 2) {
                        if (rand < 40) prize = { type: 'empty', val: 0 };
                        else if (rand < 97) { let val = Math.floor(Math.random() * 300) + 400; prize = { type: 'honey', val: val }; }
                        else if (rand < 99) prize = { type: 'key2', val: 1 };
                        else prize = { type: 'key3', val: 1 };
                    } else {
                        if (rand < 35) prize = { type: 'empty', val: 0 };
                        else if (rand < 98.5) { let val = Math.floor(Math.random() * 300) + 700; prize = { type: 'honey', val: val }; }
                        else if (rand < 99.5) prize = { type: 'key4', val: 1 };
                        else prize = { type: 'key5', val: 1 };
                    }
                } else {
                    if (currentCaseId === 1) prize = rand < 70 ? { type: 'honey', val: 50 } : { type: 'honey', val: 1100 };
                    else if (currentCaseId === 2) prize = rand < 60 ? { type: 'honey', val: 50 } :
