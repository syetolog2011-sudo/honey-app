<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
            position: relative;
        }

        /* КОНТЕЙНЕР ДЛЯ 5 КЛЮЧЕЙ */
        .keys-container {
            display: flex;
            justify-content: center;
            gap: 6px; 
            margin-top: 25px;
            margin-bottom: 25px;
            width: 98%;
        }
        
        .key-slot {
            position: relative;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        .key-slot img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            display: block;
            margin-bottom: 12px;
        }

        .key-count {
            position: absolute;
            bottom: 6px;
            left: 8px;
            font-size: 13px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 5px;
        }

        /* БЛОК БАЛАНСА */
        .balance-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .balance-number { font-size: 28px; font-weight: 900; }
        .honey-icon { width: 32px; height: 32px; }

        /* ЭКРАНЫ */
        .screen {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .active-screen {
            display: flex; 
        }

        /* ГЛАВНОЕ МЕНЮ */
        .buttons-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
            width: 100%;
        }
        .menu-btn {
            background: none; border: none; padding: 0; cursor: pointer;
            width: 92%; max-width: 360px; transition: transform 0.1s ease;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn img { width: 100%; height: auto; display: block; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4)); }

        /* ЭКРАН БАНОК (СЕТКА) */
        .banks-list {
            display: flex;
            flex-wrap: wrap;       /* Позволяет карточкам переноситься на новую строку */
            justify-content: center; /* Центрирует банку на второй строке */
            gap: 14px;             /* Расстояние между карточками */
            width: 95%;
            max-width: 380px;      /* Ограничение под ширину экрана телефона */
            margin-top: 20px;
        }

        /* Кнопка возврата (стрелочка) */
        .back-arrow-btn {
            position: absolute;
            top: -20px; 
            right: 15px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #ffffff;
            cursor: pointer;
            line-height: 1;
            transition: background 0.2s, transform 0.1s ease;
            z-index: 10;
        }
        .back-arrow-btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.92);
        }

        /* КВАДРАТНЫЕ КАРТОЧКИ ДЛЯ БАНОК */
        .bank-card {
            width: calc(50% - 7px); /* Ровно половина ширины с учетом gap */
            aspect-ratio: 1 / 1;    /* Делает карточку строго квадратной */
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Распределяет банку вверх, а кнопку вниз */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .bank-img {
            width: 75px;        /* Чуть уменьшил размер под компактный квадрат */
            height: 75px;
            object-fit: contain;
            display: block;
            margin-top: 5px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5)); 
        }

        /* Кнопка открыть внутри квадрата */
        .open-btn {
            width: 100%;
            background: #eab308; 
            color: #0f172a;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
        }
        .open-btn:active { 
            background: #ca8a04;
            transform: scale(0.96); 
        }

        .banks-screen-padding {
            height: 40px;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- 1. Панель ключей -->
    <div class="keys-container">
        <div class="key-slot"><img src="key1.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key2.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key3.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key4.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key5.png"><div class="key-count">0</div></div>
    </div>

    <!-- 2. Баланс -->
    <div class="balance-container">
        <div class="balance-number">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <!-- ================= ЭКРАН 1: ГЛАВНОЕ МЕНЮ ================= -->
    <div id="main-screen" class="screen active-screen">
        <div class="buttons-list">
            <button class="menu-btn"><img src="case.png" alt="Кейсы"></button>
            <button class="menu-btn" onclick="switchScreen('banks-screen')"><img src="banka.png" alt="Банки"></button>
            <button class="menu-btn"><img src="igra.png" alt="Игры"></button>
        </div>
    </div>

    <!-- ================= ЭКРАН 2: ОТКРЫТИЕ БАНОК ================= -->
    <div id="banks-screen" class="screen">
        
        <!-- Кнопка возврата в меню -->
        <div class="back-arrow-btn" onclick="switchScreen('main-screen')">←</div>

        <!-- Сетка банок (2 в ряд + 1 внизу по центру) -->
        <div class="banks-list">
            
            <!-- Квадрат 1 -->
            <div class="bank-card">
                <img src="banka1.png" alt="Банка 1" class="bank-img">
                <button class="open-btn" onclick="alert('Открываем Банку 1!')">Открыть</button>
            </div>

            <!-- Квадрат 2 -->
            <div class="bank-card">
                <img src="banka2.png" alt="Банка 2" class="bank-img">
                <button class="open-btn" onclick="alert('Открываем Банку 2!')">Открыть</button>
            </div>

            <!-- Квадрат 3 -->
            <div class="bank-card">
                <img src="banka3.png" alt="Банка 3" class="bank-img">
                <button class="open-btn" onclick="alert('Открываем Банку 3!')">Открыть</button>
            </div>

        </div>

        <div class="banks-screen-padding"></div>
    </div>

    <script>
        function switchScreen(screenId) {
            document.getElementById('main-screen').classList.remove('active-screen');
            document.getElementById('banks-screen').classList.remove('active-screen');
            document.getElementById(screenId).classList.add('active-screen');
        }
    </script>

</body>
</html>
