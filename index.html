<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body { margin: 0; padding: 0; background: radial-gradient(circle, #334155 0%, #0f172a 100%); background-attachment: fixed; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; min-height: 100vh; position: relative; overflow-x: hidden; }
        .keys-container { display: flex; justify-content: center; gap: 6px; margin-top: 25px; margin-bottom: 25px; width: 98%; }
        .key-slot { position: relative; width: 90px; height: 90px; background: rgba(255, 255, 255, 0.1); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.2); box-sizing: border-box; }
        .key-slot img { width: 50px; height: 50px; object-fit: contain; display: block; margin-bottom: 12px; }
        .key-count { position: absolute; bottom: 6px; left: 8px; font-size: 13px; font-weight: bold; background: rgba(0, 0, 0, 0.6); padding: 2px 6px; border-radius: 5px; }
        .balance-container { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
        .balance-number { font-size: 28px; font-weight: 900; }
        .honey-icon { width: 32px; height: 32px; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; position: relative; }
        .active-screen { display: flex; }
        .buttons-list { display: flex; flex-direction: column; align-items: center; gap: 36px; width: 100%; }
        .menu-btn { background: none; border: none; padding: 0; cursor: pointer; width: 92%; max-width: 360px; transition: transform 0.1s ease; }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn img { width: 100%; height: auto; display: block; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4)); }
        .banks-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; width: 95%; max-width: 380px; margin-top: 20px; }
        .back-arrow-btn { position: absolute; top: -20px; right: 15px; width: 36px; height: 36px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ffffff; cursor: pointer; z-index: 100; }
        .bank-card { width: calc(50% - 7px); aspect-ratio: 1 / 1; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .bank-img { width: 95px; height: 95px; object-fit: contain; }
        .roulette-container-horizontal { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; padding: 0 10px; }
        .slots-lines-holder { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 25px; }
        .roulette-wrapper-horizontal { position: relative; width: 100%; height: 75px; background: #0f172a; border-radius: 16px; border: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden; }
        .roulette-marker-horizontal { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: #ef4444; z-index: 10; pointer-events: none; }
        .roulette-tape-horizontal { display: flex; align-items: center; position: absolute; left: 0; top: 0; height: 100%; transition: transform 0s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .slot-item-horizontal { width: 110px; height: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; border-right: 1px solid rgba(255, 255, 255, 0.05); background: #1e293b; gap: 2px; }
        .slot-item-horizontal img { width: 24px; height: 24px; object-fit: contain; }
        .count-selector-box { display: flex; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; padding: 4px; gap: 5px; margin-bottom: 20px; }
        .selector-btn { background: transparent; border: none; color: #94a3b8; padding: 8px 20px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .selector-btn.active { background: rgba(255, 255, 255, 0.15); color: #ffffff; }
        .spin-action-btn { width: 95%; max-width: 340px; background: #2563eb; color: #ffffff; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="keys-container">
        <div class="key-slot"><img src="key1.png"><div class="key-count" id="ui-key1">0</div></div>
        <div class="key-slot"><img src="key2.png"><div class="key-count" id="ui-key2">0</div></div>
        <div class="key-slot"><img src="key3.png"><div class="key-count" id="ui-key3">0</div></div>
        <div class="key-slot"><img src="key4.png"><div class="key-count" id="ui-key4">0</div></div>
        <div class="key-slot"><img src="key5.png"><div class="key-count" id="ui-key5">0</div></div>
    </div>

    <div class="balance-container">
        <div class="balance-number" id="ui-balance">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <div id="main-screen" class="screen active-screen">
        <div class="buttons-list">
            <button class="menu-btn"><img src="case.png"></button>
            <button class="menu-btn" onclick="switchScreen('banks-screen')"><img src="banka.png"></button>
            <button class="menu-btn"><img src="igra.png"></button>
        </div>
    </div>

    <div id="banks-screen" class="screen">
        <div class="back-arrow-btn" onclick="switchScreen('main-screen')">←</div>
        <div class="banks-list">
            <div class="bank-card" onclick="alert('Банка 1')"><img src="banka1.png" class="bank-img"></div>
            <div class="bank-card" onclick="alert('Банка 2')"><img src="banka2.png" class="bank-img"></div>
            <div class="bank-card" onclick="openHorizontalSlots()"><img src="banka3.png" class="bank-img"></div>
        </div>
    </div>

    <div id="roulette-screen" class="screen">
        <div class="back-arrow-btn" onclick="switchScreen('banks-screen')">←</div>
        <div class="roulette-container-horizontal">
            <div class="count-selector-box">
                <button class="selector-btn active" id="btn-mode-1" onclick="changeLinesCount(1)">1</button>
                <button class="selector-btn" id="btn-mode-2" onclick="changeLinesCount(2)">2</button>
                <button class="selector-btn" id="btn-mode-3" onclick="changeLinesCount(3)">3</button>
            </div>
            <div class="slots-lines-holder" id="slotsHolder"></div>
            <button class="spin-action-btn" id="btnSpinAction" onclick="spinHorizontalSlots()">Крутить</button>
        </div>
    </div>

    <script>
        let playerData = { honey: 12500, key4: 0, key5: 0 };
        let currentLines = 1; 
        let isSpinning = false;
        const itemWidth = 110;

        function updateUI() {
            document.getElementById('ui-balance').innerText = playerData.honey.toLocaleString();
            document.getElementById('ui-key4').innerText = playerData.key4;
            document.getElementById('ui-key5').innerText = playerData.key5;
        }
        updateUI();

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function openHorizontalSlots() {
            switchScreen('roulette-screen');
            renderRouletteLines();
        }

        function changeLinesCount(count) {
            if (isSpinning) return;
            currentLines = count;
            document.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-mode-${count}`).classList.add('active');
            renderRouletteLines();
        }

        function renderRouletteLines() {
            const holder = document.getElementById('slotsHolder');
            holder.innerHTML = '';
            for (let l = 0; l < currentLines; l++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'roulette-wrapper-horizontal';
                wrapper.innerHTML = `<div class="roulette-marker-horizontal"></div><div class="roulette-tape-horizontal" id="tape-${l}"></div>`;
                holder.appendChild(wrapper);
                fillTape(`tape-${l}`);
            }
        }

        function fillTape(id) {
            const tape = document.getElementById(id);
            for (let i = 0; i < 40; i++) {
                const div = document.createElement('div');
                div.className = 'slot-item-horizontal';
                div.innerHTML = `<span>?</span>`;
                tape.appendChild(div);
            }
        }

        function spinHorizontalSlots() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('btnSpinAction').disabled = true;

            for (let l = 0; l < currentLines; l++) {
                let rand = Math.random() * 100;
                let prize;
                
                if (rand < 34.5) prize = { type: 'empty', text: 'Ничего', val: 0 };
                else if (rand < 98.5) {
                    let val = Math.floor(Math.random() * (1000 - 700 + 1)) + 700;
                    prize = { type: 'honey', text: val, val: val, img: 'honey.png' };
                }
                else if (rand < 99.5) prize = { type: 'key4', text: 'Ключ', val: 1, img: 'key4.png' };
                else prize = { type: 'key5', text: 'Ультра', val: 1, img: 'key5.png' };

                const tape = document.getElementById(`tape-${l}`);
                tape.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.1, 1)';
                tape.style.transform = `translateX(${-3000}px)`; // Упрощенная анимация

                setTimeout(() => {
                    if (prize.type === 'honey') playerData.honey += prize.val;
                    else if (prize.type === 'key4') playerData.key4 += 1;
                    else if (prize.type === 'key5') playerData.key5 += 1;
                    updateUI();
                    if (l === currentLines - 1) { isSpinning = false; document.getElementById('btnSpinAction').disabled = false; }
                }, 4100);
            }
        }
    </script>
</body>
</html>
