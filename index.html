<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body { margin: 0; padding: 0; background: radial-gradient(circle, #334155 0%, #0f172a 100%); background-attachment: fixed; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; user-select: none; min-height: 100vh; overflow-x: hidden; }
        .keys-container { display: flex; justify-content: center; gap: 6px; margin-top: 25px; margin-bottom: 25px; }
        .key-slot { position: relative; width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.2); }
        .key-slot img { width: 30px; height: 30px; object-fit: contain; }
        .key-count { position: absolute; bottom: 2px; font-size: 11px; background: rgba(0,0,0,0.5); padding: 0 4px; border-radius: 4px; }
        .balance-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .balance-number { font-size: 24px; font-weight: 900; }
        .honey-icon { width: 28px; height: 28px; }
        
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active-screen { display: flex; }
        
        .banks-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .bank-card { width: 100px; height: 100px; background: rgba(255, 255, 255, 0.08); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .bank-img { width: 70px; }
        
        .roulette-wrapper { position: relative; width: 300px; height: 80px; background: #1e293b; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 2px solid #334155; }
        .marker { position: absolute; left: 50%; width: 3px; height: 100%; background: #ef4444; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .item { width: 100px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border-right: 1px solid #334155; }
        .item img { width: 40px; height: 40px; }
        
        .count-selector-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .selector-btn { padding: 10px 20px; background: #334155; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .selector-btn.active { background: #2563eb; }
        .spin-btn { padding: 15px 50px; background: #2563eb; border: none; border-radius: 15px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="keys-container">
        <div class="key-slot"><img src="key4.png"><div class="key-count" id="ui-key4">0</div></div>
        <div class="key-slot"><img src="key5.png"><div class="key-count" id="ui-key5">0</div></div>
    </div>
    <div class="balance-container">
        <div class="balance-number" id="ui-balance">12 500</div>
        <img src="honey.png" class="honey-icon">
    </div>

    <div id="main-screen" class="screen active-screen">
        <div class="banks-list">
            <button class="bank-card" onclick="switchScreen('banks-screen')"><img src="banka.png" class="bank-img"></button>
        </div>
    </div>

    <div id="banks-screen" class="screen">
        <button onclick="switchScreen('main-screen')">Назад</button>
        <div class="banks-list">
            <div class="bank-card" onclick="openRoulette()"><img src="banka3.png" class="bank-img"></div>
        </div>
    </div>

    <div id="roulette-screen" class="screen">
        <div class="count-selector-box">
            <button class="selector-btn active" onclick="setLines(1, this)">1</button>
            <button class="selector-btn" onclick="setLines(2, this)">2</button>
            <button class="selector-btn" onclick="setLines(3, this)">3</button>
        </div>
        <div id="slotsHolder"></div>
        <button class="spin-btn" id="spinBtn" onclick="spin()">Крутить</button>
    </div>

    <script>
        let playerData = { honey: 12500, key4: 0, key5: 0 };
        let currentLines = 1;
        const pool = [
            { type: 'empty', text: '❌', img: '' },
            { type: 'honey', text: 'Мёд', img: 'honey.png' },
            { type: 'key4', text: 'Ключ', img: 'key4.png' },
            { type: 'key5', text: 'Ультра', img: 'key5.png' }
        ];

        function updateUI() {
            document.getElementById('ui-balance').innerText = playerData.honey.toLocaleString();
            document.getElementById('ui-key4').innerText = playerData.key4;
            document.getElementById('ui-key5').innerText = playerData.key5;
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function setLines(n, btn) {
            currentLines = n;
            document.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function openRoulette() {
            switchScreen('roulette-screen');
            renderSlots();
        }

        function renderSlots() {
            const holder = document.getElementById('slotsHolder');
            holder.innerHTML = '';
            for(let i=0; i<currentLines; i++) {
                holder.innerHTML += `
                    <div class="roulette-wrapper">
                        <div class="marker"></div>
                        <div class="tape" id="tape-${i}"></div>
                    </div>`;
                fillTape(`tape-${i}`);
            }
        }

        function fillTape(id) {
            const tape = document.getElementById(id);
            for(let i=0; i<40; i++) {
                const item = pool[Math.floor(Math.random()*pool.length)];
                tape.innerHTML += `<div class="item">${item.img ? `<img src="${item.img}">` : item.text}</div>`;
            }
        }

        function spin() {
            document.getElementById('spinBtn').disabled = true;
            for(let i=0; i<currentLines; i++) {
                const tape = document.getElementById(`tape-${i}`);
                tape.style.transform = `translateX(-1500px)`;
                
                setTimeout(() => {
                    let rand = Math.random() * 100;
                    if(rand < 34.5) { /* Пусто */ }
                    else if(rand < 98.5) { playerData.honey += Math.floor(Math.random()*(1000-700+1))+700; }
                    else if(rand < 99.5) { playerData.key4 += 1; }
                    else { playerData.key5 += 1; }
                    updateUI();
                    if(i === currentLines - 1) document.getElementById('spinBtn').disabled = false;
                }, 4100);
            }
        }
    </script>
</body>
</html>
