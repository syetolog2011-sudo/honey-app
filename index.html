<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        /* Чистый белый фон */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Блок баланса по центру */
        .balance-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            margin-bottom: 25px;
        }

        .balance-number {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .honey-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        /* Список кнопок */
        .buttons-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px; /* Отступы между кнопками */
            width: 100%;
        }

        /* КНОПКИ СТАЛИ ЕЩЁ БОЛЬШЕ (85% ширины экрана) */
        .menu-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            width: 85%; /* Увеличил до 85% */
            max-width: 320px; /* Ограничение для экранов побольше */
            transition: transform 0.1s ease;
        }

        .menu-btn:active {
            transform: scale(0.96);
        }

        .menu-btn img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="balance-container">
        <div class="balance-number">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <div class="buttons-list">
        
        <button class="menu-btn" onclick="console.log('Кейсы')">
            <img src="case.png" alt="Кейсы">
        </button>

        <button class="menu-btn" onclick="console.log('Банки')">
            <img src="banka.png" alt="Банки">
        </button>

        <button class="menu-btn" onclick="console.log('Игры')">
            <img src="igra.png" alt="Игры">
        </button>

    </div>

</body>
</html>
