<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey Project</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Твой фон */
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .content-scroll {
            width: 100%;
            /* Отступы, чтобы карточки не прилипали */
            padding: 40px 0 120px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Расстояние между карточками */
            overflow-y: auto;
        }

        /* СТИЛЬ КАРТОЧКИ (ТЕПЕРЬ ЭТО ТОЛЬКО КАРТИНКА) */
        .image-card {
            width: 90%;
            max-width: 350px;
            /* Убрали фон и обводку, оставили только тень и скругление */
            border-radius: 25px;
            overflow: hidden; /* Чтобы картинка не вылезала за углы */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            /* Убираем синее выделение при клике на мобильных */
            -webkit-tap-highlight-color: transparent; 
        }

        /* Эффект при нажатии */
        .image-card:active {
            transform: scale(0.96);
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        /* Сама картинка внутри карточки */
        .image-card img {
            width: 100%;
            height: auto;
            display: block; /* Убирает отступ снизу у img */
            object-fit: cover; /* Заполняет всю площадь */
        }

        /* КНОПКА МЕНЮ СНИЗУ */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 65px;
            background: linear-gradient(45deg, #f39c12, #f1c40f);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
            cursor: pointer;
            z-index: 100;
            border: none;
            color: white;
            font-size: 30px;
        }
    </style>
</head>
<body>

    <div class="content-scroll">
        <div class="image-card" onclick="openCases()">
            <img src="cases.png" alt="Кейсы">
        </div>

        <div class="image-card" onclick="openBank()">
            <img src="bank.png" alt="Банк">
        </div>

        <div class="image-card" onclick="openGame()">
            <img src="game.png" alt="Игра">
        </div>
    </div>

    <button class="bottom-nav" onclick="toggleMenu()">☰</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function toggleMenu() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            tg.showPopup({
                title: 'Меню',
                message: 'Куда отправимся?',
                buttons: [
                    {id: 'stats', type: 'default', text: '📊 Статистика'},
                    {id: 'friends', type: 'default', text: '👥 Друзья'},
                    {id: 'close', type: 'destructive', text: 'Закрыть'}
                ]
            });
        }

        function openCases() { 
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Открываем кейсы..."); 
        }
        function openBank() { 
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Заходим в банк..."); 
        }
        function openGame() { 
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Запускаем игру..."); 
        }
    </script>
</body>
</html>
