<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            min-height: 100vh;
        }

        /* Верхняя панель с ключами */
        .keys-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .key-slot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Баланс (мёд сдвинут вправо) */
        .balance-container {
            display: flex;
            align-items: center;
            gap: 15px; /* Увеличил отступ для сдвига */
            margin-bottom: 40px;
        }
        .balance-number {
            font-size: 28px;
            font-weight: 900;
        }
        .honey-icon {
            width: 32px;
            height: 32px;
        }

        /* Список кнопок */
        .buttons-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
            width: 100%;
        }
        .menu-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            width: 92%;
            max-width: 360px;
            transition: transform 0.1s ease;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn img { width: 100%; height: auto; display: block; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4)); }
    </style>
</head>
<body>

    <div class="keys-container">
        <div class="key-slot"><img src="key1.png" width="30"></div>
        <div class="key-slot"><img src="key2.png" width="30"></div>
        <div class="key-slot"><img src="key3.png" width="30"></div>
        <div class="key-slot"><img src="key4.png" width="30"></div>
    </div>

    <div class="balance-container">
        <div class="balance-number">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <div class="buttons-list">
        <button class="menu-btn"><img src="case.png" alt="Кейсы"></button>
        <button class="menu-btn"><img src="banka.png" alt="Банки"></button>
        <button class="menu-btn"><img src="igra.png" alt="Игры"></button>
    </div>

</body>
</html>
