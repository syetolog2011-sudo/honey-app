<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        /* Обнуляем стили, делаем чистый белый фон */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Блок баланса сверху */
        .balance-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        .balance-number {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin-bottom: 4px;
        }

        .honey-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Контейнер для кнопок-картинок */
        .buttons-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; /* Расстояние между кнопками */
            width: 100%;
        }

        /* Сами кнопки — теперь они будут аккуратными на телефоне */
        .menu-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            width: 45%; /* Зажимаем кнопку до 45% от ширины экрана телефона */
            max-width: 180px; /* Чтобы на компе не растягивалось слишком сильно */
            transition: transform 0.1s ease;
        }

        .menu-btn:active {
            transform: scale(0.96); /* Эффект нажатия */
        }

        .menu-btn img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px; /* Скругление, если картинка без него */
        }
    </style>
</head>
<body>

    <div class="balance-container">
        <div class="balance-number">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <div class="buttons-list">
        
        <button class="menu-btn" onclick="console.log('Кейсы')">
            <img src="case.png" alt="Кейсы">
        </button>

        <button class="menu-btn" onclick="console.log('Банки')">
            <img src="banka.png" alt="Банки">
        </button>

        <button class="menu-btn" onclick="console.log('Игры')">
            <img src="igra.png" alt="Игры">
        </button>

    </div>

</body>
</html>
