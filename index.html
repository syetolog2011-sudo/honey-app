<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* КЛЮЧИ И БАЛАНС */
        .keys-container {
            display: flex;
            justify-content: center;
            gap: 6px; 
            margin-top: 25px;
            margin-bottom: 25px;
            width: 98%;
        }
        .key-slot {
            position: relative;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }
        .key-slot img { width: 50px; height: 50px; object-fit: contain; display: block; margin-bottom: 12px; }
        .key-count { position: absolute; bottom: 6px; left: 8px; font-size: 13px; font-weight: bold; background: rgba(0, 0, 0, 0.6); padding: 2px 6px; border-radius: 5px; }
        .balance-container { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .balance-number { font-size: 28px; font-weight: 900; }
        .honey-icon { width: 32px; height: 32px; }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; position: relative; }
        .active-screen { display: flex; }

        /* МЕНЮ */
        .buttons-list { display: flex; flex-direction: column; align-items: center; gap: 36px; width: 100%; }
        .menu-btn { background: none; border: none; padding: 0; cursor: pointer; width: 92%; max-width: 360px; transition: transform 0.1s ease; }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn img { width: 100%; height: auto; display: block; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4)); }

        /* СЕТКА БАНОК */
        .banks-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; width: 95%; max-width: 380px; margin-top: 20px; }
        .back-arrow-btn { position: absolute; top: -20px; right: 15px; width: 36px; height: 36px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ffffff; cursor: pointer; z-index: 10; }
        .bank-card { width: calc(50% - 7px); aspect-ratio: 1 / 1; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4); cursor: pointer; transition: transform 0.1s ease; -webkit-tap-highlight-color: transparent; }
        .bank-card:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.96); }
        .bank-img { width: 95px; height: 95px; object-fit: contain; display: block; filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.5)); }

        /* ================= НОВЫЙ ЭКРАН КЕЙСА (ПОД ФОТО) ================= */
        .roulette-screen-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Вертикальное окно прокрутки */
        .vertical-roulette-box {
            position: relative;
            width: 180px;
            height: 320px; /* Высота под 3 элемента (один в центре, два по краям) */
            background: transparent;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        /* Указатели-стрелочки сверху и снизу как на фото */
        .arrow-indicator-top {
            position: absolute;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            font-size: 24px; color: rgba(255, 255, 255, 0.4);
            z-index: 15;
        }
        .arrow-indicator-bottom {
            position: absolute;
            bottom: 5px; left: 50%;
            transform: translateX(-50%);
            font-size: 24px; color: rgba(255, 255, 255, 0.4);
            z-index: 15;
        }

        /* Вертикальная лента с призами */
        .roulette-tape-vertical {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            width: 100%;
            transition: transform 0s cubic-bezier(0.1, 0.8, 0.1, 1);
            will-change: transform;
        }

        /* Слот внутри вертикальной рулетки */
        .slot-item-vertical {
            width: 100%;
            height: 100px; /* Строгая фиксированная высота одной ячейки */
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Полупрозрачные плашки под предметами, как на скриншоте */
        .slot-badge {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            min-width: 70px;
            justify-content: center;
        }

        .slot-item-vertical img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        /* ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ (ОПЦИИ) */
        .options-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 90%;
            justify-content: center;
        }

        .checkbox-label {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .checkbox-label:active { background: rgba(255, 255, 255, 0.12); }
        .checkbox-label input { transform: scale(1.2); cursor: pointer; }

        /* КНОПКА КРУТИТЬ (ТОЧЬ-В-ТОЧЬ КАК НА ФОТО) */
        .spin-action-btn {
            width: 92%;
            max-width: 340px;
            background: #2563eb; /* Яркий синий цвет с фото */
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: transform 0.1s ease, background 0.2s;
        }
        .spin-action-btn:active {
            transform: scale(0.97);
            background: #1d4ed8;
        }
        .spin-action-btn:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }
        .spin-action-btn img { width: 20px; height: 20px; }

        .banks-screen-padding { height: 40px; width: 100%; }
    </style>
</head>
<body>

    <div class="keys-container">
        <div class="key-slot"><img src="key1.png"><div class="key-count" id="ui-key1">0</div></div>
        <div class="key-slot"><img src="key2.png"><div class="key-count" id="ui-key2">0</div></div>
        <div class="key-slot"><img src="key3.png"><div class="key-count" id="ui-key3">0</div></div>
        <div class="key-slot"><img src="key4.png"><div class="key-count" id="ui-key4">0</div></div>
        <div class="key-slot"><img src="key5.png"><div class="key-count" id="ui-key5">0</div></div>
    </div>

    <div class="balance-container">
        <div class="balance-number" id="ui-balance">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <div id="main-screen" class="screen active-screen">
        <div class="buttons-list">
            <button class="menu-btn"><img src="case.png" alt="Кейсы"></button>
            <button class="menu-btn" onclick="switchScreen('banks-screen')"><img src="banka.png" alt="Банки"></button>
            <button class="menu-btn"><img src="igra.png" alt="Игры"></button>
        </div>
    </div>

    <div id="banks-screen" class="screen">
        <div class="back-arrow-btn" onclick="switchScreen('main-screen')">←</div>
        <div class="banks-list">
            <div class="bank-card" onclick="alert('Открываем Банку 1!')"><img src="banka1.png" class="bank-img"></div>
            <div class="bank-card" onclick="alert('Открываем Банку 2!')"><img src="banka2.png" class="bank-img"></div>
            <div class="bank-card" onclick="openBank3Roulette()"><img src="banka3.png" class="bank-img"></div>
        </div>
        <div class="banks-screen-padding"></div>
    </div>

    <div id="roulette-screen" class="screen">
        <div class="back-arrow-btn" onclick="switchScreen('banks-screen')">←</div>

        <div class="roulette-screen-container">
            
            <div class="vertical-roulette-box">
                <div class="arrow-indicator-top">∨</div>
                <div class="arrow-indicator-bottom">∧</div>
                
                <div class="roulette-tape-vertical" id="tapeVertical"></div>
            </div>

            <div class="options-container">
                <label class="checkbox-label">
                    <input type="checkbox" id="checkFastSpin"> Быстро
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="checkTripleSpin" onchange="toggleTripleMode()"> Открыть х3
                </label>
            </div>

            <button class="spin-action-btn" id="btnSpinAction" onclick="startVerticalSpin()">
                <span id="spinBtnText">Крутить за 700</span> <img src="honey.png">
            </button>

        </div>
        <div class="banks-screen-padding"></div>
    </div>

    <script>
        let playerData = { honey: 12500, key5: 0 };

        function updateUI() {
            document.getElementById('ui-balance').innerText = playerData.honey.toLocaleString();
            document.getElementById('ui-key5').innerText = playerData.key5;
        }
        updateUI();

        function switchScreen(screenId) {
            document.getElementById('main-screen').classList.remove('active-screen');
            document.getElementById('banks-screen').classList.remove('active-screen');
            document.getElementById('roulette-screen').classList.remove('active-screen');
            document.getElementById(screenId).classList.add('active-screen');
        }

        // Переключение текста цены при активации х3
        function toggleTripleMode() {
            const isTriple = document.getElementById('checkTripleSpin').checked;
            document.getElementById('spinBtnText').innerText = isTriple ? 'Крутить х3 за 2100' : 'Крутить за 700';
        }

        // Открытие экрана рулетки
        function openBank3Roulette() {
            switchScreen('roulette-screen');
            buildVerticalTape(); // Сразу генерируем начальный вид
        }

        const verticalTape = document.getElementById('tapeVertical');
        const itemHeight = 100; // Фиксированная высота одной ячейки в пикселях
        let isSpinning = false;

        // Набор элементов пула
        const poolItems = [
            { type: 'honey', text: '600', img: 'honey.png' },
            { type: 'honey', text: '750', img: 'honey.png' },
            { type: 'honey', text: '850', img: 'honey.png' },
            { type: 'empty', text: 'Пусто', img: '' },
            { type: 'key', text: 'Ключ 5', img: 'key5.png' }
        ];

        // Первичная сборка чистой ленты
        function buildVerticalTape() {
            verticalTape.style.transition = 'none';
            // Сдвигаем на 100px вниз, чтобы изначально в центре (на позиции 110px от верха) стоял красивый элемент
            verticalTape.style.transform = `translateY(100px)`; 
            verticalTape.innerHTML = '';

            for (let i = 0; i < 45; i++) {
                const rand = poolItems[Math.floor(Math.random() * poolItems.length)];
                createSlotElement(rand);
            }
        }

        // Вспомогательная функция создания элемента ячейки
        function createSlotElement(info) {
            const row = document.createElement('div');
            row.className = 'slot-item-vertical';
            
            if (info.type === 'empty') {
                row.innerHTML = `<div style="font-size:32px; line-height:1;">💨</div><div class="slot-badge">Пусто</div>`;
            } else {
                row.innerHTML = `<img src="${info.img}"><div class="slot-badge">⭐ ${info.text}</div>`;
            }
            verticalTape.appendChild(row);
        }

        function startVerticalSpin() {
            if (isSpinning) return;

            const isFast = document.getElementById('checkFastSpin').checked;
            const isTriple = document.getElementById('checkTripleSpin').checked;
            const cost = isTriple ? 2100 : 700;

            if (playerData.honey < cost) {
                alert('Недостаточно мёда!');
                return;
            }

            // Списание средств
            isSpinning = true;
            playerData.honey -= cost;
            updateUI();

            document.getElementById('btnSpinAction').disabled = true;

            // Генерируем массив наград (1 или 3 штуки)
            let sessionPrizes = [];
            const count = isTriple ? 3 : 1;

            for (let i = 0; i < count; i++) {
                let rand = Math.random() * 100;
                if (rand <= 50) {
                    let hAmount = Math.floor(Math.random() * (850 - 600 + 1)) + 600;
                    sessionPrizes.push({ type: 'honey', text: `${hAmount}`, val: hAmount, img: 'honey.png' });
                } else if (rand <= 99) {
                    sessionPrizes.push({ type: 'empty', text: 'Пусто', val: 0, img: '' });
                } else {
                    sessionPrizes.push({ type: 'key', text: 'Ключ 5', val: 1, img: 'key5.png' });
                }
            }

            // Для отображения в рулетке берем финальный (или единственный) приз
            const mainPrize = sessionPrizes[sessionPrizes.length - 1];

            // Пересобираем ленту под этот бросок
            verticalTape.style.transition = 'none';
            verticalTape.style.transform = `translateY(100px)`;
            verticalTape.innerHTML = '';

            // Генерируем первые ячейки случайно
            const winIndex = 35; 
            for (let i = 0; i < 45; i++) {
                if (i === winIndex) {
                    // Подставляем реальный выигрыш в целевую точку
                    createSlotElement(mainPrize);
                } 
                // СТРАТЕГИЧЕСКИЙ БАЙТ (ПЕРЕКАТ): Сразу над или под выигрышным элементом ВСЕГДА ставим Ключ 5!
                else if (i === winIndex - 1 || i === winIndex + 1) {
                    createSlotElement({ type: 'key', text: 'Ключ 5', img: 'key5.png' });
                } 
                else {
                    const rand = poolItems[Math.floor(Math.random() * poolItems.length)];
                    createSlotElement(rand);
                }
            }

            // Рассчитываем точную позицию остановки ленты
            // Формула: сдвиг вверх на расстояние до элемента + корректировка центра
            const targetPos = -(winIndex * itemHeight) + 100;

            // Время анимации зависит от режима "Быстро"
            const spinDuration = isFast ? 400 : 4000;
            const transitionStyle = isFast 
                ? 'transform 0.4s ease-out' 
                : 'transform 4s cubic-bezier(0.1, 0.8, 0.1, 1)';

            setTimeout(() => {
                verticalTape.style.transition = transitionStyle;
                verticalTape.style.transform = `translateY(${targetPos}px)`;
            }, 40);

            // Окончание прокрутки
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('btnSpinAction').disabled = false;

                // Начисляем все выигранные награды из сессии
                let alertText = isTriple ? "Вы получили призы:\n" : "Вы выиграли: ";
                
                sessionPrizes.forEach(prize => {
                    if (prize.type === 'honey') {
                        playerData.honey += prize.val;
                        alertText += `🍯 ${prize.text} мёда\n`;
                    } else if (prize.type === 'key') {
                        playerData.key5 += 1;
                        alertText += `🔑 Ключ 5!\n`;
                    } else {
                        alertText += `💨 Пусто\n`;
                    }
                });

                alert(alertText.trim());
                updateUI();
            }, spinDuration + 200);
        }
    </script>

</body>
</html>
