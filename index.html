<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
        }

        /* Контейнер для ключей */
        .keys-container {
            display: flex;
            justify-content: center;
            gap: 6px; 
            margin-top: 25px;
            margin-bottom: 25px;
            width: 98%;
        }
        
        .key-slot {
            position: relative;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        .key-slot img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            display: block;
            margin-bottom: 12px;
        }

        .key-count {
            position: absolute;
            bottom: 6px;
            left: 8px;
            font-size: 13px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 5px;
        }

        /* Блок баланса */
        .balance-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .balance-number { font-size: 28px; font-weight: 900; }
        .honey-icon { width: 32px; height: 32px; }

        /* ЭКРАНЫ */
        .screen {
            display: none; /* По умолчанию все экраны скрыты */
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .active-screen {
            display: flex; /* Показывается только активный экран */
        }

        /* Главное меню */
        .buttons-list {
            flex-direction: column;
            align-items: center;
            gap: 36px;
            width: 100%;
        }
        .menu-btn {
            background: none; border: none; padding: 0; cursor: pointer;
            width: 92%; max-width: 360px; transition: transform 0.1s ease;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn img { width: 100%; height: auto; display: block; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4)); }

        /* ЭКРАН БАНОК */
        .banks-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        /* Отсеки для банок */
        .bank-card {
            width: 92%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .bank-placeholder {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Кнопка открыть */
        .open-btn {
            width: 100%;
            background: #eab308; /* Красивый желтый цвет под мед */
            color: #0f172a;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .open-btn:active { background: #ca8a04; }

        /* Кнопка Назад */
        .back-btn {
            margin-top: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .back-btn:active { background: rgba(255, 255, 255, 0.25); }
    </style>
</head>
<body>

    <div class="keys-container">
        <div class="key-slot"><img src="key1.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key2.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key3.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key4.png"><div class="key-count">0</div></div>
        <div class="key-slot"><img src="key5.png"><div class="key-count">0</div></div>
    </div>

    <div class="balance-container">
        <div class="balance-number">12 500</div>
        <img src="honey.png" alt="🍯" class="honey-icon">
    </div>

    <div id="main-screen" class="screen active-screen">
        <div class="buttons-list">
            <button class="menu-btn"><img src="case.png" alt="Кейсы"></button>
            <button class="menu-btn" onclick="switchScreen('banks-screen')"><img src="banka.png" alt="Банки"></button>
            <button class="menu-btn"><img src="igra.png" alt="Игры"></button>
        </div>
    </div>

    <div id="banks-screen" class="screen">
        <div class="banks-list">
            
            <div class="bank-card">
                <div class="bank-placeholder">Банка 1</div>
                <button class="open-btn" onclick="alert('Открываем Банку 1!')">Открыть</button>
            </div>

            <div class="bank-card">
                <div class="bank-placeholder">Банка 2</div>
                <button class="open-btn" onclick="alert('Открываем Банку 2!')">Открыть</button>
            </div>

            <div class="bank-card">
                <div class="bank-placeholder">Банка 3</div>
                <button class="open-btn" onclick="alert('Открываем Банку 3!')">Открыть</button>
            </div>

        </div>

        <button class="back-btn" onclick="switchScreen('main-screen')">Назад</button>
    </div>

    <script>
        function switchScreen(screenId) {
            // Прячем все экраны
            document.getElementById('main-screen').classList.remove('active-screen');
            document.getElementById('banks-screen').classList.remove('active-screen');
            
            // Показываем нужный
            document.getElementById(screenId).classList.add('active-screen');
        }
    </script>

</body>
</html>
