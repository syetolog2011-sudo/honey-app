<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Изменили на .png */
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-scroll {
            width: 100%;
            padding: 20px 0 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            overflow-y: auto;
        }

        .module-card {
            width: 90%;
            max-width: 350px;
            background: rgba(0, 0, 0, 0.5); /* Чуть темнее, чтобы на png было лучше видно */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .module-card:active {
            transform: scale(0.97);
        }

        .module-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        h2 { margin: 0; font-size: 22px; color: #f1c40f; }
        p { margin: 5px 0 0 0; opacity: 0.8; font-size: 14px; }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 65px;
            background: linear-gradient(45deg, #f39c12, #f1c40f);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 100;
        }

        .bottom-nav span {
            font-size: 30px;
        }

        .shadow-text {
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <div class="content-scroll">
        <h1 class="shadow-text">Honey Project</h1>

        <div class="module-card" onclick="openCases()">
            <img src="cases.png" alt="Кейсы">
            <h2>Кейсы</h2>
            <p>Испытай удачу и выбей редкий мёд</p>
        </div>

        <div class="module-card" onclick="openBank()">
            <img src="bank.png" alt="Банк">
            <h2>Банки меда</h2>
            <p>Храни и приумножай свои запасы</p>
        </div>

        <div class="module-card" onclick="openGame()">
            <img src="game.png" alt="Игра">
            <h2>Мини-игра</h2>
            <p>Зарабатывай мёд в реальном времени</p>
        </div>
    </div>

    <div class="bottom-nav" onclick="toggleMenu()">
        <span>☰</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function toggleMenu() {
            tg.showPopup({
                title: 'Меню проекта',
                message: 'Выберите нужный раздел',
                buttons: [
                    {id: 'stats', type: 'default', text: '📈 Моя статистика'},
                    {id: 'friends', type: 'default', text: '👥 Друзья'},
                    {id: 'close', type: 'destructive', text: 'Закрыть'}
                ]
            });
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function openCases() { 
            tg.showAlert("Раздел 'Кейсы' скоро будет доступен!");
        }
        function openBank() { 
            tg.showAlert("Банк мёда находится на техобслуживании");
        }
        function openGame() { 
            tg.showAlert("Игра запустится после подключения базы данных");
        }
    </script>
</body>
</html>
