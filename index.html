<script>
    let playerData = { honey: 12500, key1: 0, key2: 0, key3: 0, key4: 0, key5: 0 };
    let currentLines = 1; 
    let isSpinning = false;
    let currentBankId = 3; 

    const itemWidth = 110; 
    
    // Пул декораций для каждой банки (чтобы не пролетали лишние ключи)
    const bankPools = {
        1: [
            { type: 'honey', text: '300', img: 'honey.png' },
            { type: 'empty', text: 'Ничего', img: '' },
            { type: 'key', text: 'Ключ', img: 'key1.png' }
        ],
        2: [
            { type: 'honey', text: '500', img: 'honey.png' },
            { type: 'empty', text: 'Ничего', img: '' },
            { type: 'key', text: 'Ключ', img: 'key2.png' },
            { type: 'key', text: 'Ключ', img: 'key3.png' }
        ],
        3: [
            { type: 'honey', text: '850', img: 'honey.png' },
            { type: 'empty', text: 'Ничего', img: '' },
            { type: 'key', text: 'Ключ', img: 'key4.png' },
            { type: 'key', text: 'Ключ', img: 'key5.png' }
        ]
    };

    const bankConfigs = {
        1: { price: 300 },
        2: { price: 500 },
        3: { price: 700 }
    };

    function updateUI() {
        document.getElementById('ui-balance').innerText = playerData.honey.toLocaleString();
        document.getElementById('ui-key1').innerText = playerData.key1;
        document.getElementById('ui-key2').innerText = playerData.key2;
        document.getElementById('ui-key3').innerText = playerData.key3;
        document.getElementById('ui-key4').innerText = playerData.key4;
        document.getElementById('ui-key5').innerText = playerData.key5;
    }
    updateUI();

    function switchScreen(screenId) {
        document.getElementById('main-screen').classList.remove('active-screen');
        document.getElementById('banks-screen').classList.remove('active-screen');
        document.getElementById('roulette-screen').classList.remove('active-screen');
        document.getElementById(screenId).classList.add('active-screen');
    }

    function openHorizontalSlots(bankId) {
        currentBankId = bankId;
        switchScreen('roulette-screen');
        changeLinesCount(1); 
        renderRouletteLines();
    }

    function changeLinesCount(count) {
        if (isSpinning) return;
        currentLines = count;

        for(let i=1; i<=3; i++) {
            document.getElementById(`btn-mode-${i}`).classList.remove('active');
        }
        document.getElementById(`btn-mode-${count}`).classList.add('active');
        
        let basePrice = bankConfigs[currentBankId].price;
        document.getElementById('spinCostText').innerText = count * basePrice;

        renderRouletteLines();
    }

    function renderRouletteLines() {
        const holder = document.getElementById('slotsHolder');
        holder.innerHTML = '';

        for (let l = 0; l < currentLines; l++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'roulette-wrapper-horizontal';
            wrapper.innerHTML = `
                <div class="roulette-marker-horizontal"></div>
                <div class="roulette-tape-horizontal" id="tape-${l}"></div>
            `;
            holder.appendChild(wrapper);
            buildSingleTape(l);
        }
    }

    function buildSingleTape(lineIndex) {
        const tape = document.getElementById(`tape-${lineIndex}`);
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0px)';
        tape.innerHTML = '';

        // Берём декорации только для текущей банки
        const activePool = bankPools[currentBankId];

        for (let i = 0; i < 45; i++) {
            const rand = activePool[Math.floor(Math.random() * activePool.length)];
            createSlotDomItem(tape, rand);
        }
    }

    function createSlotDomItem(parentTape, itemData) {
        const block = document.createElement('div');
        block.className = `slot-item-horizontal item-${itemData.type}`;
        
        if (itemData.type === 'empty') {
            block.innerHTML = `<span style="font-size:20px; line-height:1;">❌</span><span>${itemData.text}</span>`;
        } else {
            block.innerHTML = `<img src="${itemData.img}"><span>${itemData.text}</span>`;
        }
        parentTape.appendChild(block);
    }

    function spinHorizontalSlots() {
        if (isSpinning) return;
        const basePrice = bankConfigs[currentBankId].price;
        const totalCost = currentLines * basePrice;

        if (playerData.honey < totalCost) {
            alert('Недостаточно мёда!');
            return;
        }

        isSpinning = true;
        playerData.honey -= totalCost;
        updateUI();

        document.getElementById('btnSpinAction').disabled = true;

        const winIndex = 30; 
        let calculatedResults = [];
        const activePool = bankPools[currentBankId];

        for (let l = 0; l < currentLines; l++) {
            let prize = {};
            let rand = Math.random() * 100;

            if (currentBankId === 1) {
                if (rand < 40) {
                    prize = { type: 'empty', text: 'Ничего', val: 0, img: '' };
                } else if (rand < 99) {
                    let hAmount = Math.floor(Math.random() * (450 - 200 + 1)) + 200;
                    prize = { type: 'honey', text: `${hAmount}`, val: hAmount, img: 'honey.png' };
                } else {
                    prize = { type: 'key1', text: 'Ключ', val: 1, img: 'key1.png' };
                }
            } 
            else if (currentBankId === 2) {
                if (rand < 40) {
                    prize = { type: 'empty', text: 'Ничего', val: 0, img: '' };
                } else if (rand < 97) {
                    let hAmount = Math.floor(Math.random() * (700 - 400 + 1)) + 400;
                    prize = { type: 'honey', text: `${hAmount}`, val: hAmount, img: 'honey.png' };
                } else if (rand < 99) {
                    prize = { type: 'key2', text: 'Ключ', val: 1, img: 'key2.png' };
                } else {
                    prize = { type: 'key3', text: 'Ключ', val: 1, img: 'key3.png' };
                }
            } 
            else {
                if (rand < 34.5) {
                    prize = { type: 'empty', text: 'Ничего', val: 0, img: '' };
                } else if (rand < 98.5) {
                    let hAmount = Math.floor(Math.random() * (1000 - 700 + 1)) + 700;
                    prize = { type: 'honey', text: `${hAmount}`, val: hAmount, img: 'honey.png' };
                } else if (rand < 99.5) {
                    prize = { type: 'key4', text: 'Ключ', val: 1, img: 'key4.png' };
                } else {
                    prize = { type: 'key5', text: 'Ключ', val: 1, img: 'key5.png' };
                }
            }
            
            calculatedResults.push(prize);

            const tape = document.getElementById(`tape-${l}`);
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            tape.innerHTML = '';

            for (let i = 0; i < 45; i++) {
                if (i === winIndex) {
                    let displayPrize = {...prize};
                    if(displayPrize.type.startsWith('key')) displayPrize.type = 'key';
                    createSlotDomItem(tape, displayPrize);
                } else {
                    const randItem = activePool[Math.floor(Math.random() * activePool.length)];
                    createSlotDomItem(tape, randItem);
                }
            }

            const wrapperWidth = document.querySelector('.roulette-wrapper-horizontal').offsetWidth;
            const stopPos = -((winIndex * itemWidth) + (itemWidth / 2) - (wrapperWidth / 2));
            const pixelOffset = Math.floor(Math.random() * 30) - 15; 

            setTimeout(() => {
                tape.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.1, 1)';
                tape.style.transform = `translateX(${stopPos + pixelOffset}px)`;
            }, 40);
        }

        setTimeout(() => {
            isSpinning = false;
            document.getElementById('btnSpinAction').disabled = false;

            calculatedResults.forEach(res => {
                if (res.type === 'honey') {
                    playerData.honey += res.val;
                } else if (playerData[res.type] !== undefined) {
                    playerData[res.type] += 1;
                }
            });

            updateUI();
        }, 4100);
    }
                </script>
